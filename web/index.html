        .skeleton-logo { width: 24px; height: 24px; border-radius: 6px; background: #f3f4f6; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .skeleton-text { width: 64px; height: 16px; border-radius: 4px; background: #f3f4f6; margin-left: 8px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        /* Conditional rendering logic based on URL path */
        #sk-dashboard, #sk-meetings, #sk-list { display: none; }
