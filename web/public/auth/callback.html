<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Turnout - Authenticating...</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fafafa; }
      .loader { width: 48px; height: 48px; border: 4px solid #e5e7eb; border-bottom-color: #3b82f6; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
      @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .container { text-align: center; }
      .text { margin-top: 16px; color: #6b7280; font-size: 14px; }
      .error { color: #ef4444; font-weight: 500; display: none; margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="spinner" class="loader"></div>
      <div id="text" class="text">Connecting to Slack...</div>
      <div id="error" class="error"></div>
    </div>
    <script>
      (async () => {
        try {
          const response = await fetch(`/api/auth/callback${window.location.search}`);
          if (response.ok) {
            window.location.href = '/';
          } else {
            const data = await response.json();
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('text').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = `Error: ${data.error || 'Failed to connect to Slack. Please try again.'}`;
            
            // Redirect to home with error after a moment so the user can see the error page banner
            setTimeout(() => {
              window.location.href = `/?error=${encodeURIComponent(data.error || 'server_error')}`;
            }, 1500);
          }
        } catch (_e) {
          window.location.href = '/?error=server_error';
        }
      })();
    </script>
  </body>
</html>
