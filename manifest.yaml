display_information:
  name: Sirsnap
  description: fill out your attendance!
  background_color: "#7e00de"
features:
  bot_user:
    display_name: Sirsnap
    always_online: true
  slash_commands:
    - command: /meetings
      url: https://sirsnap.programming-aaaaaeyr6ul5biewy5byj6ykgq.workers.dev/api/slack
      description: View and manage meetings
      should_escape: false
    - command: /setrole
      url: https://sirsnap.programming-aaaaaeyr6ul5biewy5byj6ykgq.workers.dev/api/slack
      description: Set a user's role (admin only)
      usage_hint: "[@user] [student|parent|alumni|mentor]"
      should_escape: false
    - command: /cdt
      url: https://sirsnap.programming-aaaaaeyr6ul5biewy5byj6ykgq.workers.dev/api/slack
      description: Manage Component Design Teams (admin only)
      usage_hint: create | edit <name> | list
      should_escape: false
oauth_config:
  redirect_urls:
    - https://sirsnap.programming-aaaaaeyr6ul5biewy5byj6ykgq.workers.dev/oauth/callback
  scopes:
    user:
      - identity.basic
      - identity.avatar
      - users:read
      - users.profile:write
      - users.profile:read
      - usergroups:write
    bot:
      - chat:write
      - channels:join
      - commands
      - usergroups:read
      - usergroups:write
      - users:read
  pkce_enabled: false
settings:
  interactivity:
    is_enabled: true
    request_url: https://sirsnap.programming-aaaaaeyr6ul5biewy5byj6ykgq.workers.dev/api/slack
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
